services:
  - type: web
    name: hz-trading-app
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: python app.py
    healthCheckPath: /api/health
    envVars:
      - key: API_SPORTS_KEY
        sync: false
      - key: GOOGLE_SHEETS_ID
        sync: false
      - key: GOOGLE_SHEETS_TAB
        sync: false
      - key: GOOGLE_CREDENTIALS_JSON
        sync: false
